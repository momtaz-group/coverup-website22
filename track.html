<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="تتبع طلب Cover Up برقم الطلب ورقم الموبايل." />
    <meta name="theme-color" content="#080806" />
    <title>Cover Up | تتبع الطلب</title>
    <link rel="icon" href="assets/brand/cover-up-symbol.png" type="image/png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header" id="top">
      <a class="brand" href="index.html" aria-label="Cover Up home">
        <img class="brand-logo" src="assets/brand/cover-up-symbol.png" alt="" />
        <bdi class="brand-wordmark"><span>Cover </span><strong>Up</strong></bdi>
      </a>
      <button class="menu-toggle" type="button" aria-label="افتح القائمة" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav class="site-nav" aria-label="التنقل الرئيسي">
        <a href="products.html">المتجر</a>
        <a href="products.html#family-visit">مندوب العيلة</a>
        <a href="corporate.html">الشركات</a>
        <a href="policies.html">السياسات</a>
      </nav>
      <div class="header-actions">
        <a class="button button-primary button-small" href="products.html">المتجر</a>
      </div>
    </header>

    <main class="simple-page">
      <section class="tracking-section">
        <div>
          <p class="eyebrow">تتبع الطلب</p>
          <h1>اكتب بيانات الطلب وشوف آخر حالة.</h1>
          <p>بنستخدم رقم الموبايل للتأكد إن بيانات الطلب تخصك.</p>
        </div>
        <form class="tracking-card" data-track-order-form data-public-track-form>
          <label>رقم الطلب <input name="orderId" type="text" required /></label>
          <label>رقم الموبايل <input name="phone" type="tel" required /></label>
          <button class="button button-primary" type="submit">تتبع</button>
          <div class="tracking-result" data-tracking-result data-public-track-result></div>
        </form>
      </section>
    </main>

    <script src="track.js"></script>
  </body>
</html>
