<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="حلول Cover Up للشركات: حماية أجهزة، كفرات، اسكرينات، صيانة، وطلبات Bulk." />
    <meta name="theme-color" content="#080806" />
    <title>Cover Up | حلول الشركات</title>
    <link rel="icon" href="assets/brand/cover-up-symbol.png" type="image/png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header" id="top">
      <a class="brand" href="index.html"><img class="brand-logo" src="assets/brand/cover-up-symbol.png" alt="" /><bdi class="brand-wordmark"><span>Cover </span><strong>Up</strong></bdi></a>
      <nav class="site-nav" aria-label="التنقل الرئيسي">
        <a href="products.html">المتجر</a>
        <a href="track.html">تتبع الطلب</a>
        <a href="policies.html">السياسات</a>
      </nav>
    </header>
    <main class="simple-page">
      <section class="corporate-request">
        <div>
          <p class="eyebrow">للشركات</p>
          <h1>طلب عرض سعر Bulk لأجهزة فريقك.</h1>
          <p>حدد عدد الأجهزة والموديلات والخدمة المطلوبة، وهيتجهز لك عرض سعر واضح للمتابعة.</p>
        </div>
        <form class="visit-form" data-corporate-form>
          <label>اسم الشركة <input name="company" type="text" required /></label>
          <label>اسم المسؤول <input name="name" type="text" required /></label>
          <label>رقم الموبايل <input name="phone" type="tel" required /></label>
          <label>الإيميل <input name="email" type="email" /></label>
          <label>عدد الأجهزة <input name="deviceCount" type="number" min="1" required /></label>
          <label>الموديلات <textarea name="models" rows="3" placeholder="iPhone 15 Pro Max, Samsung S24..." required></textarea></label>
          <label>المطلوب <textarea name="needs" rows="3" placeholder="كفرات، اسكرينات، تركيب، صيانة، توريد شهري..." required></textarea></label>
          <button class="button button-primary" type="submit">اطلب عرض السعر</button>
        </form>
      </section>
    </main>
    <script src="corporate.js"></script>
  </body>
</html>
